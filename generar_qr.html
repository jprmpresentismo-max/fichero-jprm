<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generar etiquetas QR · Fichero JPRM</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root{ --bg:#0f1720; --panel:#182430; --panel2:#1f2e3c; --line:#2a3a49; --text:#e8edf2; --muted:#8aa0b2; --accent:#3fb8af; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:20px;}
  h1{font-size:1.1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 4px;}
  h2{margin:0 0 16px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;}
  textarea{width:100%;min-height:160px;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:monospace;font-size:.9rem;}
  .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:1rem;font-weight:600;background:var(--accent);color:#08201d;margin-top:12px;cursor:pointer;}
  .muted{color:var(--muted);font-size:.9rem;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
  .label{background:#fff;color:#000;border-radius:8px;padding:8px;text-align:center;}
  .label img{width:100%;}
  .label .nom{font-size:.72rem;font-weight:700;margin-top:4px;line-height:1.1;}
  .label .leg{font-size:.62rem;color:#444;}
  @media print{
    body *{visibility:hidden;}
    #imprimible, #imprimible *{visibility:visible;}
    #imprimible{position:absolute;top:0;left:0;width:100%;}
    .label{border:1px dashed #999; break-inside:avoid;}
  }
</style>
</head>
<body>

<h1>JPRM · Junta Médica</h1>
<h2>Alta de fichas y etiquetas QR</h2>

<script>
  const SUPABASE_URL = "https://TU-PROYECTO.supabase.co";
  const SUPABASE_ANON_KEY = "TU-ANON-KEY";
</script>

<div class="card" id="form-card">
  <p class="muted">Pegá una fila por ficha: <code>legajo&#9;nombre y apellido</code> (separados por tabulación, como al copiar de Excel).</p>
  <textarea id="datos" placeholder="12345&#9;Pérez, Juan&#10;12346&#9;Gómez, Ana"></textarea>
  <button class="btn" id="btn-generar">Generar QR y dar de alta</button>
  <p class="muted" id="status"></p>
</div>

<div class="card hidden" id="print-card" style="display:none;">
  <button class="btn" id="btn-print">🖨️ Imprimir etiquetas</button>
  <div class="grid" id="imprimible"></div>
</div>

<script>
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function codigoUnico(){
  return "F-" + Math.random().toString(36).slice(2, 8).toUpperCase();
}

document.getElementById("btn-generar").onclick = async () => {
  const status = document.getElementById("status");
  const lineas = document.getElementById("datos").value.split("\n").map(l => l.trim()).filter(Boolean);
  if (!lineas.length){ status.textContent = "Pegá al menos una fila."; return; }

  status.textContent = `Procesando ${lineas.length} ficha(s)…`;
  const filas = lineas.map(l => {
    const [legajo, nombre] = l.split("\t");
    return { codigo: codigoUnico(), legajo: (legajo||"").trim(), nombre_paciente: (nombre||legajo||"").trim() };
  });

  const { data, error } = await supa.from("fichas").insert(filas).select();
  if (error){ status.textContent = "Error: " + error.message; return; }

  status.textContent = `${data.length} ficha(s) dadas de alta. Generando etiquetas…`;
  const cont = document.getElementById("imprimible");
  cont.innerHTML = "";
  for (const f of data){
    const url = await QRCode.toDataURL(f.codigo, { width: 200, margin: 1 });
    const div = document.createElement("div");
    div.className = "label";
    div.innerHTML = `<img src="${url}"><div class="nom">${f.nombre_paciente}</div><div class="leg">Legajo ${f.legajo || "-"} · ${f.codigo}</div>`;
    cont.appendChild(div);
  }
  document.getElementById("print-card").style.display = "block";
  status.textContent = `Listo: ${data.length} etiqueta(s) generadas.`;
};

document.getElementById("btn-print").onclick = () => window.print();
</script>
</body>
</html>
